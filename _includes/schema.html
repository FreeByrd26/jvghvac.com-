<!-- AI-discoverable structured data — JVG HVAC -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "HVACBusiness",
  "name": "{{ site.title }}",
  "alternateName": "JVG HVAC",
  "telephone": "{{ site.phone }}",
  "email": "{{ site.email }}",
  "url": "{{ site.url }}",
  "priceRange": "$$",
  "description": "{{ site.description }}",
  "slogan": "{{ site.slogan }}",
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "Napa",
    "addressRegion": "CA",
    "addressCountry": "US"
  },
  "areaServed": [
    "Napa CA", "Sonoma CA", "St. Helena CA", "Yountville CA",
    "Calistoga CA", "Petaluma CA", "Healdsburg CA", "Sebastopol CA",
    "Vacaville CA", "Fairfield CA", "Glen Ellen CA", "Kenwood CA", "Windsor CA",
    "Napa County CA", "Sonoma County CA", "Solano County CA"
  ],
  "founder": "The Garcia family",
  "openingHoursSpecification": {
    "@type": "OpeningHoursSpecification",
    "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
    "opens": "{{ site.hours.open }}",
    "closes": "{{ site.hours.close }}"
  },
  "hasCredential": [
    "{{ site.license_full }}",
    "C-20 HVAC",
    "C-10 Electrical",
    "B General Contractor"
  ],
  "makesOffer": {
    "@type": "Offer",
    "name": "{{ site.offer_name }}",
    "price": "{{ site.offer_price }}",
    "priceCurrency": "USD",
    "description": "Visual and operational HVAC inspection — no repairs, cleaning, or component replacements included. Covers blower motor, ignition system, safety controls, gas piping, venting, carbon monoxide levels, heat exchanger, condenser coil, electrical connections, thermostat, and furnace cycle."
  }
}
</script>
