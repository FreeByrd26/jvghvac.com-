<!-- ═══ JVG MENU ═══ -->
<header class="jvg-menu">
  <div class="jvg-menu__inner">
    <a class="jvg-menu__brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} — home">
      <img class="jvg-menu__logo" src="{{ '/assets/images/jvg-logo.png' | relative_url }}" alt="{{ site.title }}" width="760" height="675" />
    </a>

    <nav class="jvg-menu__nav" aria-label="Primary">
      <a href="{{ '/services/' | relative_url }}">Services</a>
      <a href="{{ '/heat-pumps/' | relative_url }}">Heat Pumps</a>
      <a href="{{ '/preventative-maintenance/' | relative_url }}">${{ site.offer_price }} Inspection</a>
      <a href="{{ '/service-areas/' | relative_url }}">Service Areas</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
      <a href="{{ '/contact/' | relative_url }}">Contact</a>
    </nav>

    <a class="jvg-menu__cta" href="tel:{{ site.phone }}">
      <svg class="jvg-menu__cta-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M20 15.5c-1.25 0-2.45-.2-3.57-.57a1 1 0 0 0-1.02.24l-2.2 2.2a15.05 15.05 0 0 1-6.59-6.59l2.2-2.21a1 1 0 0 0 .25-1.02A11.36 11.36 0 0 1 8.5 4a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1c0 9.39 7.61 17 17 17a1 1 0 0 0 1-1v-3.5a1 1 0 0 0-1-1z"/>
      </svg>
      <span>
        <strong>Call {{ site.phone_display }}</strong>
        <em>Always here to answer</em>
      </span>
    </a>

    <button class="jvg-menu__burger" aria-label="Menu" onclick="this.closest('.jvg-menu').classList.toggle('is-open')">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
